name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r scripts/requirements.txt
      - run: python3 scripts/test_session_binding.py -v
      - run: python3 scripts/test_git_remotes.py -v
      - run: python3 scripts/test_hub_upgrade.py -v
      - run: python3 scripts/test_workflow_plan_loop.py -v
      - run: python3 scripts/test_workflow_gates.py -v
      - run: python3 scripts/test_workflow_code_review.py -v
      - run: python3 scripts/test_code_reviewer_skill.py -v
      - run: python3 scripts/test_workflow_resume.py -v
      - run: python3 scripts/test_workflow_plan_reviewer_rules.py -v
      - run: python3 scripts/test_hub_git.py -v
      - run: python3 scripts/test_workflow_delivery.py -v
